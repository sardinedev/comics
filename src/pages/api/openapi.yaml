openapi: 3.1.0
info:
  title: Comics Library API
  version: 0.1.0
  description: Personal comics library backed by Elasticsearch

servers:
  - url: http://localhost:4321/api
    description: Local development

paths:
  /search:
    get:
      summary: Search series in the library
      operationId: searchLibrary
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (minimum 2 characters)
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Matching series from the library
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibrarySearchResult"

  /search/comicvine:
    get:
      summary: Search series on ComicVine
      operationId: searchComicVine
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (minimum 2 characters)
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Matching series from ComicVine
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComicVineSearchResult"

  /series:
    get:
      summary: List all series
      operationId: getAllSeries
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated series list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSeriesSummary"

components:
  schemas:
    SeriesSummary:
      type: object
      required: [series_id, series_name, series_year]
      properties:
        series_id:
          type: string
        series_name:
          type: string
        series_year:
          type: string
        series_cover_url:
          type: string
          nullable: true

    PaginatedResult:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    LibrarySearchResult:
      type: object
      required: [series_id, series_name, series_year]
      properties:
        series_id:
          type: string
        series_name:
          type: string
        series_year:
          type: string
        series_publisher:
          type: string
          nullable: true
        series_cover_url:
          type: string
          nullable: true

    ComicVineSearchResult:
      type: object
      required: [id, name, start_year]
      properties:
        id:
          type: integer
        name:
          type: string
        start_year:
          type: string
        publisher:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true

    PaginatedSeriesSummary:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SeriesSummary"
